name: Auto Login ClawCloud

on:
  schedule:
    # 每天 UTC 0:00 运行（北京时间 8:00）
    - cron: '0 0 * * *'
    # 每天 UTC 12:00 运行（北京时间 20:00）
    - cron: '0 12 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      wait_2fa:
        description: '2FA 等待时间（秒）'
        required: false
        default: '60'

jobs:
  login:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps
      
      - name: Run Auto Login
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          GH_SESSION: ${{ secrets.GH_SESSION }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # 自定义等待时间
          TWO_FACTOR_WAIT: ${{ github.event.inputs.wait_2fa || '60' }}
          DEVICE_VERIFY_WAIT: '60'
          REDIRECT_WAIT: '90'
        run: python scripts/auto_login.py
      
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: "*.png"
          retention-days: 7
