name: ClawCloud Auto Login

on:
  schedule:
    # 每天 UTC 0:00 和 12:00 运行（北京时间 8:00 和 20:00）
    - cron: '0 0,12 * * *'
  
  workflow_dispatch:  # 支持手动触发
    inputs:
      debug:
        description: '启用调试模式'
        required: false
        default: 'false'

env:
  # 等待时间配置（可选）
  DEVICE_VERIFY_WAIT: 60
  TWO_FACTOR_WAIT: 60
  REDIRECT_WAIT: 90

jobs:
  login:
    runs-on: ubuntu-22.04  # 改用 Ubuntu 22.04 避免依赖问题
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2 \
            libatspi2.0-0
      
      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 安装 Playwright 浏览器
        run: |
          playwright install chromium --with-deps
      
      - name: 运行自动登录
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          GH_SESSION: ${{ secrets.GH_SESSION }}
          GITHUB_2FA_SECRET: ${{ secrets.GITHUB_2FA_SECRET }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python scripts/auto_login.py
      
      - name: 上传截图（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: '*.png'
          retention-days: 7
      
      - name: 上传截图（调试模式）
        if: github.event.inputs.debug == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_number }}
          path: '*.png'
          retention-days: 3
